name: "eKaza Wizard"
description: "Provisioning wizard — discovers eKaza cameras from Tuya, configures Frigate, LocalTuya, PTZ scripts and dashboard automatically."
version: "0.2.0"
slug: "ekaza_wizard"
init: false
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
startup: services
boot: manual
# full_access required: writes /config/scripts/, reads /addon_configs/{frigate}/config.yaml
full_access: true
ingress: true
ingress_port: 7788
panel_icon: mdi:cctv
panel_title: "eKaza Wizard"
# All options are optional — they pre-populate the wizard UI on load.
# Nothing is required at install time; enter credentials directly in the wizard.
options:
  tuya_access_id: ""
  tuya_access_secret: ""
  tuya_region: "us"
  rtsp_password: ""
  frigate_slug: ""
schema:
  tuya_access_id: str
  tuya_access_secret: str
  tuya_region: str
  rtsp_password: str
  frigate_slug: str
hassio_api: true
homeassistant_api: true
auth_api: true
